# Experiment 0 sweep — domain-only (no rehearsal) hyperparameter grid on Qwen3.5-4B.
#
# Dual goal: (1) calibrate that forgetting is measurable; (2) find the best-case recipe that
# learns MedRAG medical text while minimizing knowledge forgetting and staying coherent.
# Driver: experiments/exp0_forgetting_signal/sweep.py (phases: train -> shortlist -> stageb -> report).
name: exp0
model: Qwen/Qwen3.5-4B
train_config: configs/train/domain_only.yaml   # no-rehearsal mix (domain weight 1.0)
eval_config: configs/eval/canary.yaml          # regression battery (gsm8k, ifeval, gpqa)
base_canary_ref: runs/genbase_canary_ref/results.json  # base reference for Δ (forgetting)
out_root: runs/exp0

# --- Small grid (≈20 points): main grid at rank 16 + a rank sub-sweep at one center. ---
grid:
  learning_rate: [1.0e-4, 2.0e-4, 5.0e-4]
  num_train_epochs: [1, 3]
  num_samples: [1000, 5000, 10000]
ranks_main: [16]                # main grid rank (fixed)
rank_subsweep:                  # +2 points: vary rank at this one center
  at: {learning_rate: 2.0e-4, num_train_epochs: 1, num_samples: 5000}
  ranks: [8, 16, 32]

# --- Stage A: cheap proxies on every point (no battery, no vLLM) ---
val_frac: 0.05                  # held-out validation slice → domain ppl Δ (learning)
early_stopping_patience: 2      # stop after N evals w/o eval_domain_loss improvement
# General corpus held out as the forgetting probe (eval_general_loss). A general-text ppl
# rise vs. base = forgetting — cheap (a Trainer eval pass), no lm-eval battery needed.
general_heldout: "hf:NeelNanda/pile-10k:train:text"
general_heldout_n: 256

# --- Stage A→B gate: keep the Pareto front (max learning, min forgetting), capped ---
shortlist_k: 6

# --- Stage B: expensive checks on the shortlist only (confirm winner on full sets after) ---
eval_limit: 200                 # items/task during the sweep (omit/null = full battery)
coherence_samples: 200          # probe generations for the looping/incoherence check

# Stage B shares ONE vLLM init: `vllm serve` holds the base + all shortlisted LoRAs, and
# both the battery (lm-eval local-completions) and coherence (HTTP) hit it by adapter name.
serve: true                     # false (or --no-serve) → legacy in-process engine per call
serve_host: 127.0.0.1
serve_port: 8000
serve_health_timeout_s: 600     # wait this long for /health after launch (weight load + graphs)
# max_loras: null               # defaults to the shortlist size (all adapters resident)
# gpu_memory_utilization: 0.9   # passed to vllm serve
# max_model_len: null           # optional context cap for the server

# Tasks treated as "format/instruction-following" vs "knowledge/reasoning" in the report.
# Genuine catastrophic forgetting should show on the knowledge tasks, not only IFEval.
format_tasks: [leaderboard_ifeval]
knowledge_tasks: [gsm8k, leaderboard_gpqa]
