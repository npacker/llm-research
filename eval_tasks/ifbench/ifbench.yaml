# Custom lm-eval task for IFBench (allenai/IFBench_test) — not shipped with lm-eval.
# Verifiable instruction-following on 57 new out-of-domain constraints; verifier
# functions vendored from github.com/allenai/IFBench (instructions*.py here).
# Same format/scoring as IFEval (prompt-/instruction-level strict & loose acc).
#
# NOTE: the published Qwen3.5-0.8B IFBench (21.0) is THINKING mode — there is no
# non-thinking 0.8B cell, so a non-thinking run here is not directly comparable.
task: ifbench
dataset_path: allenai/IFBench_test
dataset_name: null
test_split: train          # the test data ships under a 'train' split
num_fewshot: 0
output_type: generate_until
doc_to_text: prompt
doc_to_target: 0
generation_kwargs:
  until: []
  do_sample: false
  temperature: 0.0
  max_gen_toks: 1280
process_results: !function utils.process_results
metric_list:
  - metric: prompt_level_strict_acc
    aggregation: mean
    higher_is_better: true
  - metric: inst_level_strict_acc
    aggregation: !function utils.agg_inst_level_acc
    higher_is_better: true
  - metric: prompt_level_loose_acc
    aggregation: mean
    higher_is_better: true
  - metric: inst_level_loose_acc
    aggregation: !function utils.agg_inst_level_acc
    higher_is_better: true
metadata:
  version: 1.0
